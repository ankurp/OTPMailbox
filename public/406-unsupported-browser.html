<!doctype html>
<html lang="en">
  <head>
    <title>Unsupported browser (406) &middot; OTP Inbox</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main { width: min(100%, 480px); text-align: center; }
      .code {
        font-size: clamp(4rem, 18vw, 7rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1.25rem;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.75rem 1.5rem;
      }
      .card h1 { font-size: 1.25rem; color: #f8fafc; margin-bottom: 0.75rem; }
      .card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; }
    </style>
  </head>
  <body>
    <!-- This file lives in public/406-unsupported-browser.html -->
    <main>
      <div class="code">406</div>
      <div class="card">
        <h1>Unsupported browser</h1>
        <p>Your browser is not supported. Please upgrade your browser to continue using OTP Inbox.</p>
      </div>
    </main>
  </body>
</html>
