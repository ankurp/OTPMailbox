# Exim4 configuration for OTP Mailbox
# Receives all emails and relays them to Rails Action Mailbox via HTTP

# Main configuration
primary_hostname = otp-mailbox
domainlist local_domains = *
hostlist relay_from_hosts = <; 0.0.0.0/0

# Accept mail from anywhere (this server is the final destination)
acl_smtp_rcpt = acl_check_rcpt
acl_smtp_data = acl_check_data

# Don't do ident lookups
rfc1413_calls = false
rfc1413_query_timeout = 0s

# Logging
log_selector = +all

# ACL for RCPT
begin acl

acl_check_rcpt:
  accept

acl_check_data:
  accept

# Routers
begin routers

# Route all mail to the Action Mailbox relay transport
action_mailbox:
  driver = accept
  transport = relay_to_rails
  no_more

# Transports
begin transports

# Pipe email to curl which POSTs it to Action Mailbox relay endpoint
relay_to_rails:
  driver = pipe
  command = /usr/bin/curl -s -X POST \
    -u "actionmailbox:${INGRESS_PASSWORD}" \
    -H "Content-Type: message/rfc822" \
    --data-binary @- \
    "${RELAY_URL}"
  user = Debian-exim
  group = Debian-exim

# Retry rules
begin retry
*   *   F,2h,15m; G,16h,1h,1.5; F,4d,6h

# Rewrite rules (none needed)
begin rewrite

# Authentication (none needed for receiving)
begin authenticators
